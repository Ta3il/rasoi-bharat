<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rasoi Bharat | Explore India's Culinary Heritage</title>
    <style>
        :root {
            --bg: #FFFBF0;
            --card: #FFFFFF;
            --card-border: #F0E8D5;
            --text: #1A1008;
            --text-muted: #7A6855;
            --accent: #FF9933;
            --green: #138808;
            --red: #C62828;
            --surface: #FFF8EE;
            --nav-bg: rgba(255, 251, 240, 0.96);
            --shadow: rgba(0, 0, 0, 0.08);
        }

        [data-theme="dark"] {
            --bg: #0D0D0D;
            --card: #1A1A1A;
            --card-border: #2D2D2D;
            --text: #F5F0E8;
            --text-muted: #A09080;
            --surface: #151515;
            --nav-bg: rgba(13, 13, 13, 0.96);
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* Navbar */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            height: 64px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }
        nav.scrolled {
            border-bottom: 1px solid var(--card-border);
            box-shadow: 0 2px 20px var(--shadow);
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            white-space: nowrap;
        }

        /* Search Bar */
        .search-container {
            position: relative;
            flex: 1;
            max-width: 420px;
            display: none; /* Hidden on mobile by default in original JSX */
        }
        @media (min-width: 768px) {
            .search-container { display: block; }
        }
        .search-container input {
            width: 100%;
            padding: 10px 20px 10px 44px;
            border-radius: 30px;
            border: 1.5px solid var(--card-border);
            background: var(--card);
            color: var(--text);
            outline: none;
            font-size: 14px;
            transition: border 0.2s;
        }
        .search-container .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .search-results {
            position: absolute;
            top: 110%;
            left: 0; right: 0;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            box-shadow: 0 8px 32px var(--shadow);
            z-index: 100;
            overflow: hidden;
            max-height: 400px;
            overflow-y: auto;
        }
        .search-item {
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .search-item:hover { background: var(--surface); }
        .search-item img { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border-radius: 30px;
            border: 1.5px solid var(--card-border);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--red));
            color: #fff;
            border: none;
            padding: 10px 24px;
        }
        .btn-round { padding: 8px; border-radius: 50%; }

        /* Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            min-height: 560px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }
        .hero-bg {
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1596547609652-9cf5d8d76921?w=1600&q=80') center/cover;
            filter: brightness(0.35);
        }
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, rgba(255, 153, 51, 0.13) 0%, rgba(198, 40, 40, 0.26) 50%, rgba(26, 10, 0, 0.66) 100%);
        }
        .hero-pattern {
            position: absolute; inset: 0; opacity: 0.04;
            background-image: repeating-linear-gradient(45deg, #FF9933 0px, #FF9933 2px, transparent 2px, transparent 20px), repeating-linear-gradient(-45deg, #FF9933 0px, #FF9933 2px, transparent 2px, transparent 20px);
        }
        .hero-content {
            position: relative;
            padding: 0 24px;
            max-width: 720px;
            z-index: 1;
        }
        .hero-badge {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 30px;
            background: rgba(255, 153, 51, 0.2);
            border: 1px solid rgba(255, 153, 51, 0.4);
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .hero h1 {
            font-size: clamp(32px, 7vw, 72px);
            font-weight: 900;
            color: #FFF;
            line-height: 1.1;
            margin-bottom: 20px;
        }
        .hero h1 span {
            background: linear-gradient(135deg, var(--accent), #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: clamp(15px, 2.5vw, 20px);
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Stats Bar */
        .stats-bar {
            background: linear-gradient(135deg, var(--accent), var(--red));
            padding: 28px 20px;
        }
        .stats-grid {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            text-align: center;
        }
        .stat-item h3 { font-size: clamp(24px, 4vw, 40px); font-weight: 900; color: #fff; }
        .stat-item p { font-size: 13px; color: rgba(255, 255, 255, 0.8); }

        /* Section Layout */
        .section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        .section-header { margin-bottom: 40px; }
        .section-title { font-size: clamp(24px, 4vw, 36px); font-weight: 800; margin-bottom: 8px; }
        .section-sub { font-size: 15px; color: var(--text-muted); }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* Card */
        .card {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px var(--shadow);
        }
        .card-img { height: 200px; position: relative; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .card:hover .card-img img { transform: scale(1.08); }
        .card-body { padding: 18px; }
        .card-body h3 { font-weight: 800; font-size: 18px; margin-bottom: 6px; }
        .card-body p { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 12px; height: 3.2em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Badges & Tags */
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .badge-veg { background: #E8F5E9; color: #2E7D32; border: 1px solid #A5D6A7; }
        .badge-nonveg { background: #FBE9E7; color: #BF360C; border: 1px solid #FFAB91; }
        .badge-dot { width: 8px; height: 8px; border-radius: 50%; }
        .badge-veg .badge-dot { background: #4CAF50; border: 2px solid #2E7D32; }
        .badge-nonveg .badge-dot { background: #FF5722; border: 2px solid #BF360C; }

        .tag { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; background: rgba(255, 153, 51, 0.1); color: var(--accent); }

        /* Footer */
        footer {
            background: #1A0A00;
            color: rgba(255, 255, 255, 0.7);
            padding: 60px 20px 20px;
            margin-top: 60px;
        }
        .footer-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            margin-bottom: 40px;
        }
        .footer-logo { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 12px; }
        .footer-title { font-weight: 700; color: #fff; margin-bottom: 16px; font-size: 15px; }
        .footer-link { display: block; padding: 4px 0; font-size: 14px; cursor: pointer; transition: color 0.2s; }
        .footer-link:hover { color: var(--accent); }

        /* Loading Overlay */
        #loader {
            position: fixed; inset: 0; background: var(--bg);
            display: none; flex-direction: column; align-items: center; justifyContent: center;
            z-index: 9999; gap: 16px;
        }
        #loader .icon { font-size: 48px; animation: spin 1s linear infinite; }

        /* Detail Page Specific */
        .banner { position: relative; height: 380px; overflow: hidden; }
        .banner img { width: 100%; height: 100%; object-fit: cover; }
        .banner-overlay { position: absolute; inset: 0; }
        .banner-content { position: absolute; bottom: 40px; left: 40px; right: 40px; color: #fff; }

        /* Scroll Progress */
        #scroll-p { position: absolute; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--red)); width: 0%; z-index: 1001; }

        /* Back to top */
        #back-top {
            position: fixed; bottom: 28px; right: 28px; width: 48px; height: 48px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--red)); border: none; cursor: pointer;
            display: none; align-items: center; justifyContent: center;
            box-shadow: 0 4px 20px rgba(255, 153, 51, 0.4); z-index: 500; color: #fff;
        }

        /* Utils */
        .spicy { display: flex; gap: 2px; }
    </style>
</head>

                vegFilter: 'all',
                spiceFilter: 5

            init() {
                this.render();
                this.renderFooter();
                window.addEventListener('scroll', () => this.handleScroll());
                
                // Hero search handling
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.search-container')) {
                        document.getElementById('search-results').style.display = 'none';
                    }
                });

                // Check system theme
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    this.toggleTheme();
                }
            },

            render() {
                const root = document.getElementById('app-root');
                root.innerHTML = '';
                
                switch(this.state.page) {
                    case 'home': root.innerHTML = this.templates.home(); break;
                    case 'states': root.innerHTML = this.templates.states(); break;
                    case 'state': root.innerHTML = this.templates.stateDetail(this.state.selectedState); break;
                    case 'dish': root.innerHTML = this.templates.dishDetail(this.state.selectedDish); break;
                    case 'favs': root.innerHTML = this.templates.favorites(); break;
                }
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            navigate(page, params = {}) {
                this.showLoader();
                setTimeout(() => {
                    this.state.page = page;
                    if (params.state) this.state.selectedState = params.state;
                    if (params.dish) this.state.selectedDish = params.dish;
                    this.render();
                    this.hideLoader();
                }, 400);
            },

            toggleTheme() {
                this.state.theme = this.state.theme === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', this.state.theme);
                document.getElementById('theme-icon').innerHTML = this.state.theme === 'light' ? this.icons.sun : this.icons.moon;
            },

                if (e) e.stopPropagation();
                if (this.state.favorites.includes(id)) {
                    this.state.favorites = this.state.favorites.filter(x => x !== id);
                } else {
                    this.state.favorites.push(id);
                }
                localStorage.setItem('rasoi_favs', JSON.stringify(this.state.favorites));
                this.render(); // Re-render to update UI

                const scrolled = window.scrollY > 64;
                document.getElementById('navbar').classList.toggle('scrolled', scrolled);
                document.getElementById('back-top').style.display = window.scrollY > 400 ? 'flex' : 'none';
                
                const total = document.documentElement.scrollHeight - window.innerHeight;
                const progress = (window.scrollY / total) * 100;
                document.getElementById('scroll-p').style.width = progress + '%';

                const resultsEl = document.getElementById('search-results');

                    resultsEl.style.display = 'none';

                const matches = DISHES_DATA.filter(d => 
                    d.name.toLowerCase().includes(q.toLowerCase()) || 
                    d.stateName.toLowerCase().includes(q.toLowerCase())
                ).slice(0, 5);

                if (matches.length > 0) {
                    resultsEl.innerHTML = matches.map(d => `
